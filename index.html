/* ── ZIP-based grocery tax estimator ── */
async function estimateGroceryTax(lat,lon){
  const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`);

  const REDUCED={"VA":2.5,"UT":3.0,"MO":1.225,"SD":4.2,"WY":4.0,"AL":4.0,"HI":4.0};
  let rate=0,note="",source="";
  if(EXEMPT_STATES.has(state)){rate=0;note="Groceries are exempt from sales tax in this state.";source="exempt";}
  else if(ZIP_TAX[zip]!==undefined){rate=ZIP_TAX[zip];note=`Rate for ZIP ${zip} (${city}, ${state}). Includes state + county + city taxes.`;source="zip";}
  else if(REDUCED[state]!==undefined){rate=REDUCED[state];note=`${state} applies a reduced grocery rate of ${REDUCED[state]}%.`;source="reduced";}
  else{rate=GROCERY_TAX[state]||0;note=`State-level estimate for ${state}. Actual rate may vary by city/county.`;source="state";}
  return{rate,state,city,zip,note,source};
}

/* ── Numpad ── */
function Pad({t,value,onChange,onDone,onCancel,label}){
  const p=d=>{if(d==="."&&value.includes("."))return;if(value.includes(".")&&value.split(".")[1]?.length>=2)return;onChange(value+d);};
  const bs={background:t.bar,color:t.tx,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8,fontSize:18,fontWeight:600,height:48,cursor:"pointer",userSelect:"none",border:"none"};
  return(
    <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.5)"}}>
      <div style={{width:"100%",maxWidth:400,borderRadius:"16px 16px 0 0",padding:12,paddingBottom:20,background:t.bg,border:`1px solid ${t.cb}`,boxShadow:t.sh}}>
        {label&&<p style={{textAlign:"center",fontSize:12,marginBottom:4,color:t.tx2}}>{label}</p>}
        <div style={{textAlign:"center",marginBottom:8}}><span style={{fontSize:24,fontWeight:700,color:t.ac}}>{value||"0"}</span></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} style={bs} onClick={()=>p(String(n))}>{n}</button>)}
          <button style={bs} onClick={()=>p(".")}>.</button>
          <button style={bs} onClick={()=>p("0")}>0</button>
          <button style={bs} onClick={()=>onChange(value.slice(0,-1))}>⌫</button>
        </div>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={onCancel} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.bar,color:t.tx2,cursor:"pointer"}}>Cancel</button>
          <button onClick={onDone} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.ac,color:t.act,cursor:"pointer"}}>Done</button>
        </div>
      </div>
    </div>
  );
}

/* ── Price Entry ── */
function PriceModal({t,item,mem,onSave,onCancel}){
  // Use remembered price only when this item has no price set yet.
  const m=item.price>0?null:mem;
  const[mode,setMode]=useState(item.price>0?(item.pm||"fixed"):(m?.pm||item.pm||"fixed"));
  const[step,setStep]=useState("idle");
  const[fv,setFv]=useState(item.pm==="fixed"&&item.price>0?String(item.price):(m&&m.pm!=="weight"&&m.price>0?String(m.price):""));
  const[up,setUp]=useState(item.up>0?String(item.up):(m&&m.up>0?String(m.up):""));
  const[wt,setWt]=useState(item.wt>0?String(item.wt):(m&&m.wt>0?String(m.wt):""));
  const[wu,setWu]=useState((m&&m.wu)||item.wu||"lb");
  const est=(parseFloat(up)||0)*(parseFloat(wt)||0);
  if(step==="nf") return(<Pad t={t} label="Enter Price" value={fv} onChange={setFv} onDone={()=>onSave({pm:"fixed",price:parseFloat(fv)||0,up:0,wt:0,wu:"lb"})} onCancel={()=>setStep("idle")}/>);
  if(step==="nu") return(<Pad t={t} label={`Price per ${wu}`} value={up} onChange={setUp} onDone={()=>setStep("idle")} onCancel={()=>setStep("idle")}/>);
  if(step==="nw") return(<Pad t={t} label={`Weight (${wu})`} value={wt} onChange={setWt} onDone={()=>setStep("idle")} onCancel={()=>setStep("idle")}/>);
  const tb={background:t.bar,color:t.tx2,border:"none",padding:"8px 0",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",flex:1};
  return(
    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.5)"}}>
      <div style={{width:"100%",maxWidth:360,borderRadius:16,overflow:"hidden",background:t.card,border:`1px solid ${t.cb}`,boxShadow:t.sh}}>
        <div style={{padding:12,borderBottom:`1px solid ${t.cb}`}}>
          <h3 style={{fontWeight:700,textAlign:"center",fontSize:14,color:t.tx}}>Set Price</h3>
          <p style={{fontSize:12,textAlign:"center",marginTop:2,color:t.tx2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>
        </div>
        <div style={{display:"flex",margin:12,borderRadius:8,padding:2,background:t.bar}}>
          <button onClick={()=>setMode("fixed")} style={{...tb,background:mode==="fixed"?t.ac:"transparent",color:mode==="fixed"?t.act:t.tx2}}>💲 Fixed</button>
          <button onClick={()=>setMode("weight")} style={{...tb,background:mode==="weight"?t.ac:"transparent",color:mode==="weight"?t.act:t.tx2}}>⚖️ Weight</button>
        </div>
        <div style={{padding:"0 12px 12px"}}>
          {mode==="fixed"?(
            <div onClick={()=>setStep("nf")} style={{padding:"20px 0",borderRadius:12,border:`2px dashed ${t.cb}`,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer"}}>
              <span style={{fontSize:24,fontWeight:700,color:t.ac}}>${fv||"0.00"}</span>
              <span style={{fontSize:11,marginTop:4,color:t.tx2}}>Tap to enter</span>
            </div>
          ):(
            <div>
              <div style={{display:"flex",gap:4,marginBottom:8}}>{WU.map(u=><button key={u} onClick={()=>setWu(u)} style={{...tb,background:wu===u?t.ac:t.bar,color:wu===u?t.act:t.tx2}}>{u}</button>)}</div>
              <div onClick={()=>setStep("nu")} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:12,borderRadius:8,border:`1px dashed ${t.cb}`,marginBottom:6,cursor:"pointer"}}>
                <span style={{fontSize:12,color:t.tx2}}>Per {wu}</span><span style={{fontSize:18,fontWeight:700,color:t.ac}}>${up||"0.00"}</span>
              </div>
              <div onClick={()=>setStep("nw")} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:12,borderRadius:8,border:`1px dashed ${t.cb}`,marginBottom:8,cursor:"pointer"}}>
                <span style={{fontSize:12,color:t.tx2}}>Weight</span><span style={{fontSize:18,fontWeight:700,color:t.ac}}>{wt||"0"} {wu}</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{WP.map(p=><button key={p} onClick={()=>setWt(String(p))} style={{...tb,flex:"none",padding:"4px 10px",background:parseFloat(wt)===p?t.ac:t.bar,color:parseFloat(wt)===p?t.act:t.tx2}}>{p} {wu}</button>)}</div>

/* ── Smart Item Input with Autocomplete ── */
function SmartInput({t,value,onChange,onSelect,icm,bcDB}){
  const[suggestions,setSuggestions]=useState([]);
  const allKnown=useMemo(()=>{
    const names=new Set([...Object.keys(icm).map(k=>k.split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ")),...Object.values(bcDB).map(v=>v.name)]);
    return[...names].filter(Boolean).sort();
  },[icm,bcDB]);

  useEffect(()=>{
    if(value.trim().length<1){setSuggestions([]);return;}
    const q=value.toLowerCase();
    const matches=allKnown.filter(n=>n.toLowerCase().startsWith(q)&&n.toLowerCase()!==q).slice(0,5);
    setSuggestions(matches);
  },[value,allKnown]);

  return(
    <div style={{position:"relative"}}>
      <input value={value} onChange={e=>onChange(e.target.value)} placeholder="Item name..." autoFocus
        style={{width:"100%",borderRadius:8,padding:"8px 10px",fontSize:14,border:`1px solid ${t.inb}`,background:t.inp,color:t.tx,outline:"none",marginBottom:suggestions.length?0:8}}/>
      {suggestions.length>0&&(
        <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${t.cb}`,marginBottom:8,marginTop:2}}>
          {suggestions.map((s,i)=>(
            <div key={i} onClick={()=>{onSelect(s);setSuggestions([]);}} style={{padding:"8px 12px",fontSize:13,cursor:"pointer",background:t.card,color:t.tx,borderBottom:i<suggestions.length-1?`1px solid ${t.cb}`:"none",display:"flex",alignItems:"center",gap:6}}>
              <span style={{color:t.ac,fontWeight:700}}>{s.slice(0,value.length)}</span>
              <span style={{color:t.tx2}}>{s.slice(value.length)}</span>
              {icm[s.toLowerCase()]&&<span style={{marginLeft:"auto",fontSize:11}}>{CAT_ICONS[icm[s.toLowerCase()]]}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Scanner with flashlight + manual fallbacks ── */
function Scanner({onResult,onManual,onClose}){
  const vr=useRef(null),sr=useRef(null),tr=useRef(null);
  const[err,setErr]=useState(null);
  const[torch,setTorch]=useState(false);
  const[torchAvail,setTorchAvail]=useState(false);
  const[hint,setHint]=useState(false);   // surface fallbacks after a few seconds of no detection
  const[typing,setTyping]=useState(false);
  const[bc,setBc]=useState("");
  useEffect(()=>{
    let c=false,iv,hintTimer;
    (async()=>{
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
        if(c){s.getTracks().forEach(t=>t.stop());return;}
        sr.current=s;
        const track=s.getVideoTracks()[0];
        tr.current=track;
        const caps=track.getCapabilities?.();
        if(caps&&caps.torch)setTorchAvail(true);
        if(vr.current){vr.current.srcObject=s;vr.current.play();}
        let d=null;
        if("BarcodeDetector" in window){
          // Some engines reject an unknown format in the list — fall back to defaults.
          try{d=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39","code_93","codabar","itf","qr_code"]});}
          catch{try{d=new BarcodeDetector();}catch{}}
        }
        if(d){
          iv=setInterval(async()=>{if(vr.current?.readyState>=2){try{const b=await d.detect(vr.current);if(b.length){clearInterval(iv);onResult(b[0].rawValue);}}catch{}}},300);
          hintTimer=setTimeout(()=>setHint(true),6000);
        }else setErr("This browser can't auto-scan barcodes. Type the number or add the item manually below.");
      }catch{setErr("Camera unavailable. Type the barcode number or add the item manually below.");}
    })();
    return()=>{c=true;if(iv)clearInterval(iv);if(hintTimer)clearTimeout(hintTimer);sr.current?.getTracks().forEach(t=>t.stop());};
  },[]);
  const stop=()=>sr.current?.getTracks().forEach(t=>t.stop());
  const toggleTorch=async()=>{if(!tr.current)return;try{await tr.current.applyConstraints({advanced:[{torch:!torch}]});setTorch(!torch);}catch{}};
  const cl=()=>{stop();onClose();};
  const manual=()=>{stop();onManual();};
  const submitBc=()=>{const v=bc.replace(/\s/g,"");if(v){stop();onResult(v);}};
  const fb={padding:"8px 16px",borderRadius:8,fontWeight:600,border:"none",cursor:"pointer",fontSize:13,background:"rgba(255,255,255,0.2)",color:"#fff"};
  return(
    <div style={{position:"fixed",inset:0,zIndex:50,background:"#000",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      {err?(
        <div style={{color:"#fff",textAlign:"center",padding:24,maxWidth:340}}>
          <p style={{fontSize:32,marginBottom:8}}>📷</p>
          <p style={{marginBottom:16,fontSize:13,lineHeight:1.5}}>{err}</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={()=>setTyping(true)} style={{...fb,background:"#fff",color:"#000"}}>⌨️ Type barcode number</button>
            <button onClick={manual} style={fb}>✏️ Add item manually</button>
            <button onClick={cl} style={{...fb,background:"transparent",border:"1px solid rgba(255,255,255,0.4)"}}>Cancel</button>
          </div>
        </div>
      ):(
      <React.Fragment>
        <div style={{position:"relative",width:"100%",maxWidth:400,aspectRatio:"4/3"}}>
          <video ref={vr} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:12}} playsInline muted/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:"60%",height:"30%",border:"2px solid #4ade80",borderRadius:8,boxShadow:"0 0 0 9999px rgba(0,0,0,0.4)"}}/>
          </div>
        </div>
        <p style={{color:"#fff",marginTop:12,fontSize:12}}>Point camera at barcode</p>
        {hint&&<p style={{color:"#fbbf24",marginTop:6,fontSize:11,textAlign:"center",maxWidth:300}}>Not scanning? Type the number or add it manually below.</p>}
        <div style={{display:"flex",gap:12,marginTop:12}}>
          {torchAvail&&<button onClick={toggleTorch} style={{...fb,background:torch?"#fbbf24":"rgba(255,255,255,0.2)",color:torch?"#000":"#fff"}}>{torch?"🔦 ON":"🔦 OFF"}</button>}
          <button onClick={cl} style={{...fb,background:"#fff",color:"#000"}}>Cancel</button>
        </div>
        <div style={{display:"flex",gap:12,marginTop:10}}>
          <button onClick={()=>setTyping(true)} style={fb}>⌨️ Type barcode</button>
          <button onClick={manual} style={fb}>✏️ Add manually</button>
        </div>
      </React.Fragment>)}
      {typing&&(
        <div style={{position:"fixed",inset:0,zIndex:55,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{width:"100%",maxWidth:320,borderRadius:16,background:"#fff",padding:16}}>
            <h3 style={{fontWeight:700,fontSize:14,marginBottom:4,textAlign:"center",color:"#111"}}>Enter barcode number</h3>
            <p style={{fontSize:11,textAlign:"center",color:"#666",marginBottom:10}}>Read the digits printed under the bars.</p>
            <input value={bc} onChange={e=>setBc(e.target.value)} inputMode="numeric" autoFocus placeholder="e.g. 012345678905" style={{width:"100%",borderRadius:8,padding:"10px 12px",fontSize:16,border:"1px solid #ccc",outline:"none",marginBottom:12,color:"#111"}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setTyping(false);setBc("");}} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:"#eee",color:"#333",cursor:"pointer"}}>Cancel</button>
              <button onClick={submitBc} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:"#16a34a",color:"#fff",cursor:"pointer"}}>Look up</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Tax / Location Picker ── */
function TaxPick({t,state,rate,onSave,onClose}){
  const[st,setSt]=useState(state);
  const[rt,setRt]=useState(rate||0);
  const[detecting,setDetecting]=useState(false);
  const[detResult,setDetResult]=useState(null);
  const[detErr,setDetErr]=useState("");
  const[showPad,setShowPad]=useState(false);
  const[padVal,setPadVal]=useState("");

  const detect=async()=>{
    setDetecting(true);setDetErr("");setDetResult(null);
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000}));
      const result=await estimateGroceryTax(pos.coords.latitude,pos.coords.longitude);
      setDetResult(result);
      if(result.state)setSt(result.state);
      setRt(result.rate);
    }catch{setDetErr("Location unavailable. Please select manually.");}
    setDetecting(false);
  };

  const handleStateChange=e=>{const s=e.target.value;setSt(s);const r=EXEMPT_STATES.has(s)?0:(GROCERY_TAX[s]||0);setRt(r);setDetResult(null);};
  if(showPad) return(<Pad t={t} label="Enter grocery tax rate (%)" value={padVal} onChange={setPadVal} onDone={()=>{setRt(parseFloat(padVal)||0);setShowPad(false);setPadVal("");}} onCancel={()=>{setShowPad(false);setPadVal("");}}/>);
  const is={width:"100%",borderRadius:8,padding:"8px 10px",fontSize:14,border:`1px solid ${t.inb}`,background:t.inp,color:t.tx,outline:"none"};
  return(
    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.5)"}}>
      <div style={{width:"100%",maxWidth:380,maxHeight:"90vh",overflowY:"auto",borderRadius:16,background:t.card,border:`1px solid ${t.cb}`,boxShadow:t.sh}}>
        <div style={{padding:12,borderBottom:`1px solid ${t.cb}`}}><h3 style={{fontWeight:700,textAlign:"center",fontSize:14,color:t.tx}}>📍 Grocery Tax Location</h3></div>
        <div style={{padding:12}}>
          <button onClick={detect} disabled={detecting} style={{width:"100%",padding:"12px 0",borderRadius:10,fontSize:13,fontWeight:600,border:"none",cursor:detecting?"not-allowed":"pointer",background:t.ac,color:t.act,marginBottom:10,opacity:detecting?0.7:1}}>
            {detecting?"⏳ Detecting...":"📡 Auto-Detect My Location"}
          </button>
          {detResult&&(
            <div style={{borderRadius:10,padding:10,marginBottom:10,background:t.bar,border:`1px solid ${t.cb}`}}>
              <p style={{fontSize:12,fontWeight:700,color:t.ac,marginBottom:4}}>📍 {detResult.city}{detResult.city?", ":""}{detResult.state} {detResult.zip}</p>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:t.tx2}}>Estimated grocery tax</span>
                <span style={{fontSize:20,fontWeight:700,color:t.ac}}>{detResult.rate===0?"Exempt":`${detResult.rate}%`}</span>
              </div>
              <p style={{fontSize:10,color:t.tx2,lineHeight:1.4}}>{detResult.note}</p>
              <div style={{marginTop:6,padding:"6px 8px",borderRadius:6,background:`${t.ac}15`}}>
                <p style={{fontSize:10,color:t.ac}}>⚠️ Estimate only. May vary by store, item type & local rules.</p>
              </div>
            </div>
          )}
          {detErr&&<p style={{fontSize:12,color:"#ef4444",textAlign:"center",marginBottom:8}}>{detErr}</p>}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{flex:1,height:1,background:t.cb}}/><span style={{fontSize:11,color:t.tx2}}>or select manually</span><div style={{flex:1,height:1,background:t.cb}}/></div>
          <label style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:t.tx2,display:"block",marginBottom:4}}>State</label>
          <select value={st} onChange={handleStateChange} style={{...is,marginBottom:10}}>{STATES.map(s=><option key={s} value={s}>{STATE_NAMES[s]||s} — {EXEMPT_STATES.has(s)?"Exempt":`${GROCERY_TAX[s]||0}%`}</option>)}</select>
          <label style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:t.tx2,display:"block",marginBottom:4}}>Grocery Tax Rate (%)</label>
          <div onClick={()=>{setPadVal(String(rt));setShowPad(true);}} style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${t.inb}`,background:t.inp,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,color:t.tx2}}>Tap to override</span>
            <span style={{fontSize:18,fontWeight:700,color:t.ac}}>{rt===0?"Exempt":`${rt}%`}</span>
          </div>
          <p style={{fontSize:10,color:t.tx2,textAlign:"center"}}>⚠️ Estimate only. May vary by store, item type & local rules.</p>
        </div>
        <div style={{padding:12,display:"flex",gap:8,borderTop:`1px solid ${t.cb}`}}>
          <button onClick={onClose} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.bar,color:t.tx2,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{onSave(st,rt);onClose();}} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.ac,color:t.act,cursor:"pointer"}}>Use {rt===0?"Exempt":`${rt}%`}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Complete Trip Modal ── */
function TripModal({t,items,tst,trate,onDone,onClose}){
  const[store,setStore]=useState("");
  const[override,setOverride]=useState(false);
  const[actual,setActual]=useState("");
  const[showPad,setShowPad]=useState(false);
  const[padVal,setPadVal]=useState("");
  const priced=items.filter(i=>i.price>0);
  const unpriced=items.filter(i=>i.price===0);
  const sub=priced.reduce((s,i)=>s+i.price,0);
  const tx=sub*trate/100;
  const est=sub+tx;
  const ovNum=parseFloat(actual)||0;
  const useOv=override&&ovNum>0;
  const diff=ovNum-est;

  if(showPad)return(<Pad t={t} label="Actual total paid (incl. tax)" value={padVal} onChange={setPadVal} onDone={()=>{setActual(padVal);setOverride(true);setShowPad(false);setPadVal("");}} onCancel={()=>{setShowPad(false);setPadVal("");}}/>);

  return(
    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.5)"}}>
      <div style={{width:"100%",maxWidth:360,maxHeight:"90vh",overflowY:"auto",borderRadius:16,background:t.card,border:`1px solid ${t.cb}`,boxShadow:t.sh}}>
        <div style={{padding:12,borderBottom:`1px solid ${t.cb}`}}><h3 style={{fontWeight:700,textAlign:"center",fontSize:14,color:t.tx}}>✅ Complete Trip</h3></div>
        <div style={{padding:12}}>
          <input value={store} onChange={e=>setStore(e.target.value)} placeholder="Store name (optional)" style={{width:"100%",borderRadius:8,padding:"8px 10px",fontSize:14,border:`1px solid ${t.inb}`,background:t.inp,color:t.tx,outline:"none",marginBottom:12}}/>
          <div style={{borderRadius:12,padding:10,background:t.bar,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:t.tx2}}><span>{priced.length} priced items</span><span>${sub.toFixed(2)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:t.tx2}}><span>Tax ({trate===0?"Exempt":`${trate}%`})</span><span>${tx.toFixed(2)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:600,paddingTop:6,marginTop:6,borderTop:`1px solid ${t.cb}`,color:useOv?t.tx2:t.ac}}>
              <span>Estimated total</span>
              <span style={{textDecoration:useOv?"line-through":"none"}}>${est.toFixed(2)}</span>
            </div>
            {useOv&&(
              <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:700,paddingTop:6,marginTop:6,borderTop:`1px solid ${t.cb}`,color:t.ac}}>
                <span>Actual total</span><span>${ovNum.toFixed(2)}</span>
              </div>
            )}
          </div>

          {/* Override actual total — receipts often differ from the estimate (sales, coupons, tax). */}
          <div style={{borderRadius:10,padding:10,marginBottom:unpriced.length>0?8:0,border:`1px solid ${t.cb}`}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12,color:t.tx}}>
              <input type="checkbox" checked={override} onChange={e=>{const on=e.target.checked;setOverride(on);if(!on)setActual("");}} style={{width:16,height:16,accentColor:t.ac}}/>
              <span>Enter actual amount paid</span>
            </label>
            {override&&(
              <React.Fragment>
                <div onClick={()=>{setPadVal(actual||est.toFixed(2));setShowPad(true);}} style={{marginTop:8,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:`1px solid ${actual?t.ac:t.inb}`,background:t.inp,cursor:"pointer"}}>
                  <span style={{fontSize:13,color:actual?t.tx:t.tx2}}>{actual?`$${ovNum.toFixed(2)}`:"Tap to enter actual total"}</span>
                  <span style={{fontSize:14,color:t.ac}}>✏️</span>
                </div>
                {useOv&&Math.abs(diff)>=0.01&&(
                  <p style={{fontSize:11,marginTop:6,color:diff>0?"#ef4444":"#16a34a"}}>{diff>0?`$${diff.toFixed(2)} over estimate`:`$${Math.abs(diff).toFixed(2)} under estimate`}</p>
                )}
              </React.Fragment>
            )}
          </div>

          {unpriced.length>0&&(
            <div style={{padding:"8px 10px",borderRadius:8,background:`${t.ac}15`,border:`1px solid ${t.ac}30`,marginTop:8}}>
              <p style={{fontSize:11,color:t.ac}}>⚠️ {unpriced.length} item{unpriced.length>1?"s":""} without price will stay on your list: {unpriced.map(i=>i.name).join(", ")}</p>
            </div>
          )}
        </div>
        <div style={{padding:12,display:"flex",gap:8,borderTop:`1px solid ${t.cb}`}}>
          <button onClick={onClose} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.bar,color:t.tx2,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>onDone(store.trim(),useOv?ovNum:null)} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.ac,color:t.act,cursor:"pointer"}}>Save Trip</button>
        </div>
      </div>
    </div>
  );
}

            <div style={{textAlign:"center",padding:"24px 0",color:t.tx2}}>
              <p style={{fontSize:32,marginBottom:8}}>🧾</p>
              <p style={{fontSize:13}}>Added from receipt scan</p>
              <p style={{fontSize:11,marginTop:4}}>Total: ${(trip.total||0).toFixed(2)}</p>
            </div>
          ):Object.keys(grouped).length>0?CATEGORIES.filter(c=>grouped[c]).map(cat=>(
            <div key={cat} style={{marginBottom:10}}>
              <p style={{fontSize:11,fontWeight:600,color:t.tx2,marginBottom:4}}>{CAT_ICONS[cat]} {cat}</p>
              {grouped[cat].map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 8px",borderRadius:6,marginBottom:2,background:t.bar}}>
                  <span style={{fontSize:13,color:t.tx}}>{item.name}</span>
                  <span style={{fontSize:13,fontWeight:600,color:t.ac}}>{item.price>0?`${item.price.toFixed(2)}`:"-"}</span>
                </div>
              ))}
            </div>
          )):(
            <div style={{textAlign:"center",padding:"24px 0",color:t.tx2}}><p style={{fontSize:13}}>No item details saved.</p></div>
          )}
        </div>

        <div style={{padding:12,borderTop:`1px solid ${t.cb}`}}>
          <button onClick={onClose} style={{width:"100%",padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.bar,color:t.tx2,cursor:"pointer"}}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── Known store/chain names for payor detection ──
   Matched anywhere in the OCR text (case-insensitive). This is far more reliable
   than guessing the "first meaningful line", since store logos are often stylized
   and read poorly, but the chain name still appears somewhere on the receipt. */
const STORE_PATTERNS=[
  {name:"Walmart",re:/\bwal[\s\-]?mart\b/i},
  {name:"Sam's Club",re:/\bsam'?s\s*club\b/i},
  {name:"Target",re:/\btarget\b/i},
  {name:"Costco",re:/\bcostco\b/i},
  {name:"Kroger",re:/\bkroger\b/i},
  {name:"Fry's Food",re:/\bfry'?s(\s*food)?\b/i},
  {name:"Safeway",re:/\bsafeway\b/i},
  {name:"Albertsons",re:/\balbertson'?s?\b/i},
  {name:"Bashas'",re:/\bbasha'?s\b/i},
  {name:"Food City",re:/\bfood\s*city\b/i},
  {name:"Sprouts",re:/\bsprouts\b/i},
  {name:"Whole Foods",re:/\bwhole\s*foods?\b/i},
  {name:"Trader Joe's",re:/\btrader\s*joe'?s?\b/i},
  {name:"Aldi",re:/\baldi\b/i},
  {name:"Lidl",re:/\blidl\b/i},
  {name:"WinCo Foods",re:/\bwinco\b/i},
  {name:"Smart & Final",re:/\bsmart\s*(?:&|and|n)?\s*final\b/i},
  {name:"Food 4 Less",re:/\bfood\s*4\s*less\b/i},
  {name:"Grocery Outlet",re:/\bgrocery\s*outlet\b/i},
  {name:"Natural Grocers",re:/\bnatural\s*grocers\b/i},
  {name:"Publix",re:/\bpublix\b/i},
  {name:"H-E-B",re:/\bh[\s\-]?e[\s\-]?b\b/i},
  {name:"Meijer",re:/\bmeijer\b/i},
  {name:"Food Lion",re:/\bfood\s*lion\b/i},
  {name:"Giant",re:/\bgiant\s*(?:food|eagle)?\b/i},
  {name:"Wegmans",re:/\bwegmans\b/i},
  {name:"Harris Teeter",re:/\bharris\s*teeter\b/i},
  {name:"Stop & Shop",re:/\bstop\s*(?:&|and|n)?\s*shop\b/i},
  {name:"ShopRite",re:/\bshop[\s\-]?rite\b/i},
  {name:"Hy-Vee",re:/\bhy[\s\-]?vee\b/i},
  {name:"Vons",re:/\bvons\b/i},
  {name:"Ralphs",re:/\bralphs\b/i},
  {name:"Save Mart",re:/\bsave\s*mart\b/i},
  {name:"Smith's",re:/\bsmith'?s\b/i},
  {name:"King Soopers",re:/\bking\s*soopers\b/i},
  {name:"QFC",re:/\bqfc\b/i},
  {name:"Dollar General",re:/\bdollar\s*general\b/i},
  {name:"Dollar Tree",re:/\bdollar\s*tree\b/i},
  {name:"Family Dollar",re:/\bfamily\s*dollar\b/i},
  {name:"CVS",re:/\bcvs\b/i},
  {name:"Walgreens",re:/\bwalgreens\b/i},
  {name:"Rite Aid",re:/\brite\s*aid\b/i},
];

/* ── Receipt OCR using Tesseract.js ── */
async function parseReceiptImage(imageUrl,onProgress){
  return new Promise((resolve)=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.onload=async()=>{
      try{
        // Preprocess: high-contrast grayscale for better OCR
        const canvas=document.createElement("canvas");
        const MAX=1600;
        const scale=Math.min(1,MAX/Math.max(img.width,img.height));
        canvas.width=Math.round(img.width*scale);
        canvas.height=Math.round(img.height*scale);
        const ctx=canvas.getContext("2d");
        ctx.filter="grayscale(1) contrast(1.8) brightness(1.1)";
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        // Gentle binarization: push near-white to white and near-black to black,
        // leaving mid-tones alone. Sharpens faint thermal-printer text for OCR.
        try{
          const id=ctx.getImageData(0,0,canvas.width,canvas.height);
          const d=id.data;
          for(let i=0;i<d.length;i+=4){
            const v=d[i];
            const nv=v>165?255:(v<95?0:v);
            d[i]=d[i+1]=d[i+2]=nv;
          }
          ctx.putImageData(id,0,0);
        }catch{}

        let text="";
        try{
          if(typeof Tesseract!=="undefined"){
            const result=await Tesseract.recognize(canvas,"eng",{
              logger:m=>{if(m.status==="recognizing text"&&onProgress)onProgress(Math.round(m.progress*100));}
            });
            text=result.data.text||"";
          }
        }catch(err){console.warn("Tesseract OCR failed:",err);}

        // Fallback: try Chrome TextDetector if Tesseract failed
        if(!text&&"TextDetector" in window){
          try{
            const td=new TextDetector();
            const texts=await td.detect(canvas);
            text=texts.map(t=>t.rawValue).join("\n");
          }catch{}
        }

        resolve(parseReceiptText(text));
      }catch{resolve({total:"",date:"",store:"",note:"Could not read image."});}
    };
    img.onerror=()=>resolve({total:"",date:"",store:"",note:"Could not load image."});
    img.src=imageUrl;
  });
}

// Return the last dollar amount on a line (totals are usually right-aligned),
// handling both 1,234.56 and 1.234,56 styles. Returns a number or null.
function lineAmount(line){
  const us=[...line.matchAll(/\d[\d,]*\.\d{2}(?!\d)/g)];
  if(us.length)return parseFloat(us[us.length-1][0].replace(/,/g,""));
  const eu=[...line.matchAll(/\d[\d.]*,\d{2}(?!\d)/g)];
  if(eu.length)return parseFloat(eu[eu.length-1][0].replace(/\./g,"").replace(",","."));
  return null;
}

function parseReceiptText(text){
  if(!text||text.trim().length===0) return{total:"",date:"",store:"",note:"⚠️ Could not read text. Please enter details manually."};
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);

  // ── Extract total ──
  // Scan line by line, classify each labeled amount, then pick the best total.
  // Key fixes vs. the old regex: word boundaries so "Subtotal" is never read as
  // "Total", explicit subtotal/tax tracking for sanity-checking, exclusion of
  // tender/change/savings/item-count lines, and preferring the bottom-most
  // grand-total line rather than the first "total" match.
  let subtotalVal=null,taxVal=null;
  const totalCands=[]; // {amount, prio, idx}
  const EXCLUDE=/\b(change|cash|tender|tendered|debit|credit|visa|master|amex|discover|account|acct|auth|approval|ref|card|points?|rewards?|save[ds]?|saving|coupon|member|items?\s*sold|qty|quantity|count)\b/;
  const NOT_TOTAL=/total\s*(savings|saved|tax|items?|qty|number|count|due\s*before)/;
  lines.forEach((line,idx)=>{
    const low=line.toLowerCase();
    const isSub=/\bsub[\s\-]?total\b/.test(low);
    const isTax=/\b(?:sales\s*)?tax\b/.test(low)&&!/total/.test(low);
    const isStrong=/\b(grand\s*total|total\s*amount|amount\s*due|balance\s*due|total\s*due|net\s*total|amount\s*paid|total\s*purchase)\b/.test(low);
    const isTotal=/\btotal\b/.test(low);
    if(!(isSub||isTax||isStrong||isTotal))return;
    let amt=lineAmount(line);
    if(amt==null){const nxt=lines[idx+1];if(nxt)amt=lineAmount(nxt);} // amount may wrap to next line
    if(amt==null||amt<=0)return;
    if(isSub){subtotalVal=amt;return;}
    if(isTax){taxVal=(taxVal||0)+amt;return;}
    if(EXCLUDE.test(low)||NOT_TOTAL.test(low))return;
    totalCands.push({amount:amt,prio:isStrong?3:2,idx});
  });

  let total="";
  if(totalCands.length){
    // Highest priority first; ties → bottom-most line (the grand total).
    totalCands.sort((a,b)=>b.prio-a.prio||b.idx-a.idx);
    total=totalCands[0].amount.toFixed(2);
  }
  // Sanity-check / fill from subtotal + tax when we have them.
  if(subtotalVal!=null){
    const expected=subtotalVal+(taxVal||0);
    if(!total)total=expected.toFixed(2);
    else if(parseFloat(total)<subtotalVal-0.01)total=Math.max(expected,parseFloat(total)).toFixed(2);
  }
  // Last resort: the largest dollar amount on the receipt.
  if(!total){
    const amounts=[...text.matchAll(/\d[\d,]*\.\d{2}(?!\d)/g)].map(m=>parseFloat(m[0].replace(/,/g,"")));
    if(amounts.length>0)total=Math.max(...amounts).toFixed(2);
  }

  // Extract date
  let date=new Date().toISOString().split("T")[0];
  const datePatterns=[
    /(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/,
    /(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})/,
    /(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2}),?\s+(\d{4})/i,
    /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/,
  ];
  for(const pat of datePatterns){
    const m=text.match(pat);
    if(m){
      try{
        let yr,mo,dy;
        if(m[1]&&isNaN(m[1])){
          const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
          mo=months[m[1].toLowerCase().slice(0,3)];dy=parseInt(m[2]);yr=parseInt(m[3]);
        }else if(parseInt(m[1])>1900){
          yr=parseInt(m[1]);mo=parseInt(m[2])-1;dy=parseInt(m[3]);
        }else{
          mo=parseInt(m[1])-1;dy=parseInt(m[2]);yr=parseInt(m[3]);
          if(yr<100)yr+=2000;
        }
        const d=new Date(yr,mo,dy);
        if(!isNaN(d)&&d.getFullYear()>2000)date=d.toISOString().split("T")[0];
      }catch{}
      break;
    }
  }

  // ── Store name (payor) ──
  // First try to recognize a known chain anywhere in the text (most reliable).
  // Pick the match closest to the top of the receipt if more than one hits.
  let store="";
  let bestIdx=Infinity;
  for(const s of STORE_PATTERNS){
    const m=text.match(s.re);
    if(m&&m.index<bestIdx){store=s.name;bestIdx=m.index;}
  }
  // Fallback: the first "meaningful" line near the top (skip headers/addresses).
  if(!store){
    const skipWords=/^(date|time|receipt|thank|welcome|cashier|operator|store\s*#|register|terminal|trans|tel|phone|fax|www\.|http|order|invoice|sold\s*to|#\d|\d{3}[\-\.]\d{3})/i;
    const addressLike=/^\d+\s+(N|S|E|W|NE|NW|SE|SW|North|South|East|West)/i;
    for(const line of lines.slice(0,8)){
      const clean=line.replace(/[^a-zA-Z0-9\s&'.\-]/g,"").trim();
      const letters=(clean.match(/[a-zA-Z]/g)||[]).length;
      if(clean.length>2&&clean.length<60&&letters>=3&&!skipWords.test(clean)&&!addressLike.test(clean)&&isNaN(clean)&&!/^\d+$/.test(clean)){
        store=clean;break;
      }
    }
  }

  const detectedParts=[];
  if(store)detectedParts.push("store");
  if(total)detectedParts.push("total");
  if(date!==new Date().toISOString().split("T")[0])detectedParts.push("date");

  const note=detectedParts.length>0
    ?`✅ Detected: ${detectedParts.join(", ")}. Please verify below.`
    :"⚠️ Could not auto-detect details — please enter manually.";
  return{total,date,store,note};
}

/* ── Receipt Scanner Modal ── */
function ReceiptScanner({t,onCapture,onClose}){
  const[preview,setPreview]=useState(null);
  const[total,setTotal]=useState("");
  const[date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const[store,setStore]=useState("");
  const[parsing,setParsing]=useState(false);
  const[ocrNote,setOcrNote]=useState("");
  const[ocrPct,setOcrPct]=useState(0);
  const[showPad,setShowPad]=useState(false);
  const[padVal,setPadVal]=useState("");
  const fileRef=useRef(null);

  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const url=URL.createObjectURL(file);
    setPreview(url);
    setParsing(true);
    setOcrPct(0);
    setOcrNote("Reading receipt...");
    setTimeout(async()=>{
      try{
        const result=await parseReceiptImage(url,(pct)=>{setOcrPct(pct);setOcrNote(`Reading receipt... ${pct}%`);});
        if(result.total)setTotal(result.total);
        if(result.date)setDate(result.date);
        if(result.store)setStore(result.store);
        setOcrNote(result.note||(result.total?"✅ Done — please verify details below.":"⚠️ Auto-detection limited. Please fill in details."));
      }catch{
        setOcrNote("⚠️ Could not read receipt. Please enter details manually.");
      }
      setParsing(false);
    },100);
  };

  if(showPad) return(<Pad t={t} label="Receipt Total (incl. tax)" value={padVal} onChange={setPadVal} onDone={()=>{setTotal(padVal);setShowPad(false);setPadVal("");}} onCancel={()=>{setShowPad(false);setPadVal("");}}/>);

  const is={width:"100%",borderRadius:8,padding:"8px 10px",fontSize:14,border:`1px solid ${t.inb}`,background:t.inp,color:t.tx,outline:"none"};

  return(
    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.5)"}}>
      <div style={{width:"100%",maxWidth:360,maxHeight:"90vh",overflowY:"auto",borderRadius:16,background:t.card,border:`1px solid ${t.cb}`,boxShadow:t.sh}}>
        <div style={{padding:12,borderBottom:`1px solid ${t.cb}`}}><h3 style={{fontWeight:700,textAlign:"center",fontSize:14,color:t.tx}}>🧾 Scan Receipt</h3></div>
        <div style={{padding:12}}>
          {!preview?(
            <div>
              <div onClick={()=>fileRef.current?.click()} style={{padding:"32px 0",borderRadius:12,border:`2px dashed ${t.cb}`,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",marginBottom:8}}>
                <span style={{fontSize:40}}>📸</span>
                <span style={{fontSize:13,fontWeight:600,color:t.tx,marginTop:8}}>Tap to take or upload photo</span>
                <span style={{fontSize:11,color:t.tx2,marginTop:4}}>of your grocery receipt</span>
              </div>
              <div style={{padding:"8px 10px",borderRadius:8,background:t.bar}}>
                <p style={{fontSize:11,color:t.tx2}}>💡 For best results: lay receipt flat, ensure good lighting, and keep text in frame. Auto-detection works best on Chrome for Android.</p>
              </div>
            </div>
          ):(
            <div>
              <img src={preview} style={{width:"100%",borderRadius:8,marginBottom:8,maxHeight:200,objectFit:"cover"}}/>
              {parsing?(
                <div style={{padding:"10px 12px",borderRadius:8,background:t.bar,marginBottom:8,textAlign:"center"}}>
                  <p style={{color:t.ac,fontSize:12,marginBottom:6}}>⏳ {ocrNote}</p>
                  <div style={{height:6,borderRadius:3,overflow:"hidden",background:t.cb}}>
                    <div style={{height:"100%",borderRadius:3,width:`${ocrPct}%`,background:t.ac,transition:"width 0.3s"}}/>
                  </div>
                </div>
              ):ocrNote?(
                <div style={{padding:"8px 10px",borderRadius:8,background:t.bar,marginBottom:8}}>
                  <p style={{fontSize:11,color:ocrNote.startsWith("✅")?t.ac:"#f59e0b"}}>{ocrNote}</p>
                </div>
              ):null}
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>

          {preview&&!parsing&&(
            <div style={{marginTop:8}}>
              <label style={{fontSize:11,fontWeight:600,color:t.tx2,display:"block",marginBottom:4}}>STORE NAME</label>
              <input value={store} onChange={e=>setStore(e.target.value)} placeholder="Store name (optional)" style={{...is,marginBottom:10}}/>
              <label style={{fontSize:11,fontWeight:600,color:t.tx2,display:"block",marginBottom:4}}>RECEIPT TOTAL (incl. tax) *</label>
              <div onClick={()=>{setPadVal(total);setShowPad(true);}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:`1px solid ${total?t.ac:t.inb}`,background:t.inp,cursor:"pointer",marginBottom:10}}>
                <span style={{fontSize:13,color:total?t.tx:t.tx2}}>{total?`${parseFloat(total).toFixed(2)}`:"Tap to enter total"}</span>
                <span style={{fontSize:14,color:t.ac}}>✏️</span>
              </div>
              <label style={{fontSize:11,fontWeight:600,color:t.tx2,display:"block",marginBottom:4}}>PURCHASE DATE</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={is}/>
              <p style={{fontSize:10,color:t.tx2,marginTop:6,textAlign:"center"}}>Please verify all fields before saving.</p>
            </div>
          )}
        </div>
        <div style={{padding:12,display:"flex",gap:8,borderTop:`1px solid ${t.cb}`}}>
          <button onClick={onClose} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.bar,color:t.tx2,cursor:"pointer"}}>Cancel</button>
          {preview&&!parsing&&(
            <button onClick={()=>{
              if(!total){setOcrNote("⚠️ Please enter the receipt total first.");return;}
              onCapture({store:store.trim(),total:parseFloat(total)||0,date:date||new Date().toISOString().split("T")[0]});
            }} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:total?t.ac:t.bar,color:total?t.act:t.tx2,cursor:"pointer"}}>
              Add to Budget
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Budget Modal ── */

    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.5)"}}>

            <button onClick={()=>setPer("monthly")} style={{flex:1,padding:"8px 0",borderRadius:6,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:per==="monthly"?t.ac:"transparent",color:per==="monthly"?t.act:t.tx2}}>Monthly</button>

          <button onClick={onClose} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.bar,color:t.tx2,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>onSave(tb,per)} style={{flex:1,padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.ac,color:t.act,cursor:"pointer"}}>Save</button>
        </div>
      </div>
    </div>
  );
}

    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.5)"}}>

/* ── Budget helpers ── */
function getMonthBounds(){const now=new Date();const start=new Date(now.getFullYear(),now.getMonth(),1);const end=new Date(now.getFullYear(),now.getMonth()+1,0);return{start,end,daysInMonth:end.getDate()};}
function getWeeksInMonth(){return getMonthBounds().daysInMonth/7;}
function dayOfMonth(){return new Date().getDate();}
function daysRemaining(){const{end}=getMonthBounds();return Math.max(0,(end-new Date())/(1000*60*60*24));}
function weeksRemaining(){return daysRemaining()/7;}

/* ── Spending View ── */
function SpendingView({t,trips,setTrips,totalBudget,budgetPeriod,onSetBudget}){
  const[period,setPeriod]=useState("monthly");
  const[showBM,setShowBM]=useState(false);
  const[showRS,setShowRS]=useState(false);
  const[viewTrip,setViewTrip]=useState(null);
  const now=new Date();

  const filtered=useMemo(()=>trips.filter(tr=>{
    const d=new Date(tr.date);
    if(period==="weekly"){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(period==="monthly")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return d.getFullYear()===now.getFullYear();
  }),[trips,period]);

  const gt=filtered.reduce((s,tr)=>s+tr.total,0);
  const pl=period==="weekly"?"This Week":period==="monthly"?"This Month":"This Year";
  const{daysInMonth}=getMonthBounds();
  const weeksInMonth=daysInMonth/7;
  const monthBudget=budgetPeriod==="weekly"?totalBudget*weeksInMonth:totalBudget;
  const weekBudget=budgetPeriod==="monthly"?totalBudget/weeksInMonth:totalBudget;
  const monthSpent=useMemo(()=>trips.filter(tr=>{const d=new Date(tr.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,tr)=>s+tr.total,0),[trips]);
  const remaining=Math.max(0,monthBudget-monthSpent);
  const over=monthSpent>monthBudget;
  const daysPassed=dayOfMonth();
  const expectedSoFar=monthBudget*(daysPassed/daysInMonth);
  const surplus=Math.max(0,expectedSoFar-monthSpent);
  const wkRem=weeksRemaining();
  const weeklyAvailRemaining=wkRem>0?(remaining+surplus)/wkRem:0;
  const pct=monthBudget>0?Math.min((monthSpent/monthBudget)*100,100):0;

  const handleReceiptCapture=({store,total,date})=>{
    const trip={date:new Date(date+"T12:00:00").toISOString(),store:store||"Receipt Scan",items:[],subtotal:total,tax:0,total,fromReceipt:true};
    const upd=[...trips,trip];setTrips(upd);LS.set("g_trips",upd);setShowRS(false);
  };

  const handleDeleteTrip=(idx)=>{
    const upd=trips.filter((_,i)=>i!==idx);
    setTrips(upd);LS.set("g_trips",upd);
    setViewTrip(null);
  };

  const handleEditTripName=(idx,name)=>{
    const upd=trips.map((tr,i)=>i===idx?{...tr,store:name}:tr);
    setTrips(upd);LS.set("g_trips",upd);
    if(viewTrip!==null)setViewTrip(idx);
  };

  // Map filtered trips back to original indices
  const filteredWithIdx=useMemo(()=>{
    return trips.map((tr,i)=>({tr,i})).filter(({tr})=>{
      const d=new Date(tr.date);
      if(period==="weekly"){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
      if(period==="monthly")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      return d.getFullYear()===now.getFullYear();
    }).reverse();
  },[trips,period]);

  return(
    <div style={{paddingBottom:32}}>
      {showBM&&<BudgetModal t={t} totalBudget={totalBudget} period={budgetPeriod} onSave={(tb,per)=>{onSetBudget(tb,per);setShowBM(false);}} onClose={()=>setShowBM(false)}/>}
      {showRS&&<ReceiptScanner t={t} onCapture={handleReceiptCapture} onClose={()=>setShowRS(false)}/>}
      {viewTrip!==null&&<TripDetailModal t={t} trip={trips[viewTrip]} tripIndex={viewTrip} onEditName={name=>handleEditTripName(viewTrip,name)} onDelete={()=>handleDeleteTrip(viewTrip)} onClose={()=>setViewTrip(null)}/>}

      <div style={{margin:"12px 12px 0",display:"flex",borderRadius:8,padding:2,background:t.bar}}>
        {["weekly","monthly","annual"].map(p=><button key={p} onClick={()=>setPeriod(p)} style={{flex:1,padding:"6px 0",borderRadius:6,fontSize:12,fontWeight:600,textTransform:"capitalize",border:"none",cursor:"pointer",background:period===p?t.ac:"transparent",color:period===p?t.act:t.tx2}}>{p}</button>)}
      </div>

      <div style={{margin:"12px 12px 0",borderRadius:12,padding:12,background:t.card,border:`1px solid ${t.cb}`,boxShadow:t.gl}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
          <span style={{fontSize:11,fontWeight:600,textTransform:"uppercase",color:t.tx2}}>{pl}</span>
          <span style={{fontSize:11,color:t.tx2}}>{filtered.length} trip{filtered.length!==1?"s":""}</span>
        </div>
        <p style={{fontSize:24,fontWeight:700,color:t.ac,marginBottom:2}}>${gt.toFixed(2)}</p>
      </div>

      {totalBudget>0&&period==="monthly"&&(
        <div style={{margin:"8px 12px 0",borderRadius:12,padding:12,background:t.card,border:`1px solid ${t.cb}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:600,color:t.tx}}>Monthly Budget</span>
            <span style={{fontSize:14,fontWeight:700,color:t.ac}}>${monthBudget.toFixed(0)}</span>
          </div>
          <div style={{height:10,borderRadius:5,overflow:"hidden",background:t.bar,marginBottom:6}}>
            <div style={{height:"100%",borderRadius:5,width:`${pct}%`,background:over?"#ef4444":t.ac,transition:"width 0.4s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:10}}>
            <span style={{color:over?"#ef4444":t.tx2}}>{over?`$${(monthSpent-monthBudget).toFixed(2)} over`:`$${remaining.toFixed(2)} remaining`}</span>
            <span style={{color:t.tx2}}>spent ${monthSpent.toFixed(2)}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{background:t.bar,borderRadius:8,padding:8,textAlign:"center"}}>
              <p style={{fontSize:10,color:t.tx2,marginBottom:2}}>Avg week budget</p>
              <p style={{fontSize:16,fontWeight:700,color:t.ac}}>${weekBudget.toFixed(2)}</p>
              <p style={{fontSize:9,color:t.tx2}}>{weeksInMonth.toFixed(1)} wks/mo</p>
            </div>
            <div style={{background:t.bar,borderRadius:8,padding:8,textAlign:"center"}}>
              <p style={{fontSize:10,color:t.tx2,marginBottom:2}}>Avail/wk remaining</p>
              <p style={{fontSize:16,fontWeight:700,color:weeklyAvailRemaining<weekBudget*0.5?"#ef4444":t.ac}}>${weeklyAvailRemaining.toFixed(2)}</p>
              <p style={{fontSize:9,color:t.tx2}}>{wkRem.toFixed(1)} wks left{surplus>0?` +$${surplus.toFixed(0)} surplus`:""}</p>
            </div>
          </div>
        </div>
      )}

      <div style={{margin:"8px 12px 0",display:"flex",gap:8}}>
        <button onClick={()=>setShowBM(true)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`2px dashed ${t.cb}`,fontSize:12,fontWeight:500,background:"transparent",color:t.tx2,cursor:"pointer"}}>🎯 {totalBudget>0?"Edit Budget":"Set Budget"}</button>
        <button onClick={()=>setShowRS(true)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`2px dashed ${t.cb}`,fontSize:12,fontWeight:500,background:"transparent",color:t.tx2,cursor:"pointer"}}>🧾 Scan Receipt</button>
      </div>

      {filteredWithIdx.length>0&&(
        <div style={{margin:"12px 12px 0"}}>
          <h3 style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:8,color:t.tx2}}>Recent Trips</h3>
          {filteredWithIdx.slice(0,20).map(({tr,i})=>(
            <div key={i} onClick={()=>setViewTrip(i)} style={{borderRadius:12,padding:10,marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between",background:t.card,border:`1px solid ${t.cb}`,cursor:"pointer",active:{opacity:0.8}}}>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:14,fontWeight:600,color:t.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tr.store||"Grocery Trip"}{tr.fromReceipt?" 🧾":""}</p>
                <p style={{fontSize:11,color:t.tx2}}>{new Date(tr.date).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})} · {tr.fromReceipt?"receipt":`${tr.items.length} items`}</p>
              </div>
              <span style={{fontSize:14,fontWeight:700,color:t.ac,marginRight:6}}>${tr.total.toFixed(2)}</span>
              <span style={{fontSize:11,color:t.tx2}}>›</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Recent Purchase Alert ── */
function RecentPurchaseAlert({t,itemName,purchases,onClose}){
  // purchases: array of {date, store, price} sorted most recent first
  const fmtDate=d=>{
    const dd=new Date(d);
    const now=new Date();
    const days=Math.floor((now-dd)/(1000*60*60*24));
    const dateStr=dd.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
    if(days===0)return`${dateStr} (today)`;
    if(days===1)return`${dateStr} (yesterday)`;
    return`${dateStr} (${days} days ago)`;
  };
  return(
    <div style={{position:"fixed",inset:0,zIndex:65,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.5)"}}>
      <div style={{width:"100%",maxWidth:340,borderRadius:16,background:t.card,border:`1px solid ${t.cb}`,boxShadow:t.sh}}>
        <div style={{padding:14,borderBottom:`1px solid ${t.cb}`}}>
          <p style={{fontSize:28,textAlign:"center",marginBottom:4}}>⏱️</p>
          <h3 style={{fontWeight:700,textAlign:"center",fontSize:14,color:t.tx}}>Recently Purchased</h3>
        </div>
        <div style={{padding:14}}>
          <p style={{fontSize:13,color:t.tx,marginBottom:10,textAlign:"center"}}>
            You bought <strong style={{color:t.ac}}>{itemName}</strong> within the last 30 days:
          </p>
          <div style={{maxHeight:200,overflowY:"auto"}}>
            {purchases.slice(0,5).map((p,i)=>(
              <div key={i} style={{padding:"8px 10px",borderRadius:8,background:t.bar,marginBottom:6}}>
                <p style={{fontSize:12,fontWeight:600,color:t.tx}}>{fmtDate(p.date)}</p>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                  <span style={{fontSize:11,color:t.tx2}}>{p.store||"Grocery Trip"}</span>
                  {p.price>0&&<span style={{fontSize:11,fontWeight:700,color:t.ac}}>${p.price.toFixed(2)}</span>}
                </div>
              </div>
            ))}
          </div>
          {purchases.length>5&&<p style={{fontSize:10,color:t.tx2,textAlign:"center",marginTop:6}}>+{purchases.length-5} more</p>}
        </div>
        <div style={{padding:12,borderTop:`1px solid ${t.cb}`}}>
          <button onClick={onClose} style={{width:"100%",padding:"10px 0",borderRadius:8,fontWeight:600,fontSize:14,border:"none",background:t.ac,color:t.act,cursor:"pointer"}}>Got it</button>
        </div>
      </div>
    </div>
  );
}
