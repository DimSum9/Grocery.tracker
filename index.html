/* ── Draggable Category List ── */
function DraggableCategoryList({t,grouped,categoryOrder,onReorder,col,setCol,chk,togChk,setPei,setEcf,rmItem,IN_CART_CAT,setEditingItem}){
  const rowRefs=useRef({});
  const handleRefs=useRef({});
  const dragState=useRef({});
  const[draggingCat,setDraggingCat]=useState(null);
  const[dropIndex,setDropIndex]=useState(null);
  const[draggedH,setDraggedH]=useState(0);
  // Keep latest values in refs so native event handlers see current data
  const latest=useRef({orderedCats:[],categoryOrder:[],onReorder:()=>{}});

  const orderedCats=categoryOrder.filter(c=>grouped[c]&&c!==IN_CART_CAT);
  const inCartItems=grouped[IN_CART_CAT]||[];
  const bs={border:"none",cursor:"pointer",fontWeight:600};

  // Update refs every render
  latest.current.orderedCats=orderedCats;
  latest.current.categoryOrder=categoryOrder;
  latest.current.onReorder=onReorder;

  const cancelDrag=()=>{
    clearTimeout(dragState.current.holdTimer);
    dragState.current={};
    setDraggingCat(null);
    setDropIndex(null);
    setDraggedH(0);
    document.body.style.userSelect="";
    document.body.style.overflow="";
    document.documentElement.style.touchAction="";
    document.body.style.touchAction="";
  };

  // Native pointerdown handler — attached imperatively via ref callback
  const attachHandle=(cat)=>(el)=>{
    if(!el){
      // Cleanup if any
      if(handleRefs.current[cat]?.cleanup)handleRefs.current[cat].cleanup();
      delete handleRefs.current[cat];
      return;
    }
    if(handleRefs.current[cat]?.el===el)return; // already attached

    const handler=(e)=>{
      // Only respond to primary button / first touch
      if(e.button!=null&&e.button!==0)return;
      e.stopPropagation();
      e.preventDefault();
      const startY=e.clientY;
      const pointerId=e.pointerId;
      dragState.current={cat,startY,active:false,pointerId};

      // Capture the pointer to this element so all events come here regardless of finger position
      try{el.setPointerCapture(pointerId);}catch{}

      dragState.current.holdTimer=setTimeout(()=>{
        const rowEl=rowRefs.current[cat];
        const h=rowEl?rowEl.getBoundingClientRect().height:60;
        const currentOrdered=latest.current.orderedCats;
        const others=currentOrdered.filter(c=>c!==cat);
        const origIdx=currentOrdered.indexOf(cat);

        // Snapshot midpoints BEFORE state changes
        const snaps={};
        others.forEach(c=>{
          const elx=rowRefs.current[c];
          if(!elx)return;
          const r=elx.getBoundingClientRect();
          snaps[c]=r.top+r.height/2;
        });

        dragState.current.active=true;
        dragState.current.draggedH=h;
        dragState.current.dropIndex=Math.min(origIdx,others.length);
        dragState.current.snaps=snaps;

        // Lock down the entire document so touch can't scroll the page
        document.body.style.userSelect="none";
        document.body.style.overflow="hidden";
        document.documentElement.style.touchAction="none";
        document.body.style.touchAction="none";
        if(navigator.vibrate)try{navigator.vibrate(15);}catch{}

        setDraggedH(h);
        setDraggingCat(cat);
        setDropIndex(dragState.current.dropIndex);
      },200);

      const onMove=(ev)=>{
        if(!dragState.current.active){
          const dy=Math.abs((ev.clientY||0)-startY);
          if(dy>10)clearTimeout(dragState.current.holdTimer);
          return;
        }
        ev.preventDefault();
        const y=ev.clientY;
        const draggedCat=dragState.current.cat;
        const others=latest.current.orderedCats.filter(c=>c!==draggedCat);
        const snaps=dragState.current.snaps||{};
        let newIdx=others.length;
        for(let i=0;i<others.length;i++){
          const mid=snaps[others[i]];
          if(mid==null)continue;
          if(y<mid){newIdx=i;break;}
        }
        if(newIdx!==dragState.current.dropIndex){
          dragState.current.dropIndex=newIdx;
          setDropIndex(newIdx);
        }
      };

      const onUp=(ev)=>{
        clearTimeout(dragState.current.holdTimer);
        if(dragState.current.active){
          const{cat:dc,dropIndex:di}=dragState.current;
          const currentOrdered=latest.current.orderedCats;
          const others=currentOrdered.filter(c=>c!==dc);
          const newOrder=[...others];
          newOrder.splice(Math.min(di,others.length),0,dc);
          const invisible=latest.current.categoryOrder.filter(c=>!currentOrdered.includes(c));
          latest.current.onReorder([...newOrder,...invisible]);
        }
        try{el.releasePointerCapture(pointerId);}catch{}
        document.documentElement.style.touchAction="";
        document.body.style.touchAction="";
        cancelDrag();
        // Remove from BOTH the element (captured) and window (fallback)
        el.removeEventListener("pointermove",onMove);
        el.removeEventListener("pointerup",onUp);
        el.removeEventListener("pointercancel",onUp);
        window.removeEventListener("pointermove",onMove);
        window.removeEventListener("pointerup",onUp);
        window.removeEventListener("pointercancel",onUp);
      };

      // Attach to the captured element AND to window as backup
      el.addEventListener("pointermove",onMove);
      el.addEventListener("pointerup",onUp);
      el.addEventListener("pointercancel",onUp);
      window.addEventListener("pointermove",onMove);
      window.addEventListener("pointerup",onUp);
      window.addEventListener("pointercancel",onUp);
    };

    el.addEventListener("pointerdown",handler);
    handleRefs.current[cat]={el,cleanup:()=>el.removeEventListener("pointerdown",handler)};
  };

  useEffect(()=>()=>{
    Object.values(handleRefs.current).forEach(h=>h.cleanup?.());
    cancelDrag();
  },[]);

  const renderItem=(item,isInCart)=>(
    <div key={item.id} style={{display:"flex",alignItems:"center",padding:"8px 12px",background:t.card,borderLeft:`1px solid ${t.cb}`,borderRight:`1px solid ${t.cb}`,borderBottom:`1px solid ${t.cb}`,opacity:chk.has(item.id)?0.45:1}}>
      <div onClick={()=>togChk(item.id)} style={{marginRight:8,cursor:"pointer"}}>
        <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${chk.has(item.id)?t.ac:t.inb}`,background:chk.has(item.id)?t.ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:t.act}}>{chk.has(item.id)?"✓":""}</div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:12,fontWeight:500,color:t.tx,textDecoration:chk.has(item.id)?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {item.qty>1&&<span style={{fontSize:11,fontWeight:700,color:t.ac,marginRight:4}}>×{item.qty}</span>}{item.name}
        </p>
        {isInCart&&item.originalCategory&&<p style={{fontSize:10,color:t.tx2}}>{CAT_ICONS[item.originalCategory]} {item.originalCategory}</p>}
        {item.pm==="weight"&&item.up>0&&<p style={{fontSize:11,color:t.tx2}}>~{item.wt} {item.wu} @ ${item.up}/{item.wu}</p>}
      </div>
      {isInCart?(
        <React.Fragment>
          <span style={{fontSize:12,fontWeight:700,marginRight:6,color:t.ac}}>${item.price>0?item.price.toFixed(2):"0.00"}</span>
          <button onClick={()=>setEditingItem(item)} style={{...bs,fontSize:13,marginRight:4,padding:"2px 6px",borderRadius:4,background:t.bar,color:t.tx2}}>✏️</button>
          <button onClick={()=>rmItem(item.id)} style={{...bs,fontSize:16,background:"transparent",color:"#ef4444"}}>×</button>
        </React.Fragment>
      ):(
        <React.Fragment>
          <button onClick={()=>setPei(item)} style={{...bs,fontSize:12,fontWeight:700,marginRight:8,padding:"2px 6px",borderRadius:4,background:"transparent",color:item.price>0?t.ac:t.tx2}}>{item.price>0?`$${item.price.toFixed(2)}`:"$0.00"}</button>
          <button onClick={()=>setEcf(item.id)} style={{...bs,fontSize:14,marginRight:4,background:"transparent"}}>{CAT_ICONS[item.originalCategory||item.category]||"📦"}</button>
          <button onClick={()=>rmItem(item.id)} style={{...bs,fontSize:16,background:"transparent",color:"#ef4444"}}>×</button>
        </React.Fragment>
      )}
    </div>
  );

  const allEmpty=orderedCats.length===0&&inCartItems.length===0;

  const renderPlaceholder=(key)=>(
    <div key={key} style={{
      height:draggedH,
      marginBottom:8,
      borderRadius:8,
      border:`2px dashed ${t.ac}`,
      background:`${t.ac}10`,
      boxShadow:`inset 0 0 0 1px ${t.ac}33`,
      transition:"height 0.2s cubic-bezier(0.25,0.8,0.25,1)",
    }}/>
  );

  const renderRow=(cat,collapsed=false)=>(
    <div
      key={cat}
      ref={el=>{rowRefs.current[cat]=el;}}
      style={{
        marginBottom:collapsed?0:8,
        maxHeight:collapsed?0:9999,
        overflow:collapsed?"hidden":"visible",
        opacity:collapsed?0:1,
        transition:"max-height 0.2s cubic-bezier(0.25,0.8,0.25,1), margin-bottom 0.2s, opacity 0.15s",
      }}
    >
      <div style={{
        borderRadius:8,overflow:"hidden",
        border:`1px solid ${t.cb}`,
        boxShadow:t.sh,
      }}>
        <div
          onClick={()=>!draggingCat&&setCol(p=>({...p,[cat]:!p[cat]}))}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"8px 12px",userSelect:"none",background:t.card,
            borderBottom:!col[cat]&&grouped[cat]?.length?`1px solid ${t.cb}`:"none",
          }}
        >
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span
              ref={attachHandle(cat)}
              style={{fontSize:18,color:t.tx2,cursor:"grab",marginRight:4,lineHeight:1,touchAction:"none",padding:"4px 6px",borderRadius:4,background:t.bar,display:"inline-block"}}
            >⠿</span>
            <span style={{fontSize:14}}>{CAT_ICONS[cat]}</span>
            <span style={{fontSize:12,fontWeight:700,color:t.tx}}>{cat}</span>
            <span style={{fontSize:11,padding:"0 6px",borderRadius:10,background:t.bar,color:t.tx2}}>{grouped[cat].length}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:t.tx2}}>{col[cat]?"▸":"▾"}</span>
          </div>
        </div>
        {!col[cat]&&grouped[cat].map(item=>renderItem(item,false))}
      </div>
    </div>
  );

  const buildList=()=>{
    if(!draggingCat)return orderedCats.map(cat=>renderRow(cat));
    const items=[];
    const others=orderedCats.filter(c=>c!==draggingCat);
    for(let i=0;i<others.length;i++){
      if(i===dropIndex)items.push(renderPlaceholder("__ph"));
      items.push(renderRow(others[i]));
    }
    if(dropIndex>=others.length)items.push(renderPlaceholder("__ph"));
    items.push(renderRow(draggingCat,true));
    return items;
  };

  return(
    <div style={{margin:"12px 12px 0"}}>
      {allEmpty&&<div style={{textAlign:"center",padding:"48px 0"}}><p style={{fontSize:40,marginBottom:8}}>🛒</p><p style={{fontSize:14,fontWeight:500,color:t.tx2}}>Your list is empty</p></div>}

      <div>{buildList()}</div>

      {inCartItems.length>0&&(
        <div style={{marginBottom:8,marginTop:4}}>
          <div onClick={()=>setCol(p=>({...p,[IN_CART_CAT]:!p[IN_CART_CAT]}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:"8px 8px 0 0",padding:"8px 12px",cursor:"pointer",userSelect:"none",background:"linear-gradient(90deg,#16a34a20,#16a34a10)",border:`1px solid #16a34a40`,borderBottom:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>🛒</span>
              <span style={{fontSize:12,fontWeight:700,color:"#16a34a"}}>In the Cart</span>
              <span style={{fontSize:11,padding:"0 6px",borderRadius:10,background:t.bar,color:t.tx2}}>{inCartItems.length}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,fontWeight:700,color:"#16a34a"}}>${inCartItems.reduce((s,i)=>s+i.price,0).toFixed(2)}</span>
              <span style={{fontSize:11,color:t.tx2}}>{col[IN_CART_CAT]?"▸":"▾"}</span>
            </div>
          </div>
          {!col[IN_CART_CAT]&&inCartItems.map(item=>renderItem(item,true))}
        </div>
      )}
    </div>
  );
}

/* ── Main App ── */
function App(){
  const[tid,setTid]=useState(()=>LS.get("g_theme")||"sunset");
  const[tab,setTab]=useState("list");
  const[items,setItems]=useState(()=>LS.get("g_current_items")||[]);
  const[tst,setTst]=useState(()=>LS.get("g_loc_st")||"AZ");
  const[trate,setTrate]=useState(()=>LS.get("g_loc_rt")??8.37);
  const[trips,setTrips]=useState(()=>LS.get("g_trips")||[]);
  const bgt=LS.get("g_bgt")||{};
  const[totalBudget,setTotalBudget]=useState(()=>bgt.tb||0);
  const[budgetPeriod,setBudgetPeriod]=useState(()=>bgt.per||"monthly");
  const[icm,setIcm]=useState(()=>LS.get("g_icm")||{});
  const[bcDB,setBcDB]=useState(()=>LS.get("g_bcdb")||{});
  const[imem,setImem]=useState(()=>LS.get("g_imem")||{}); // name(lc) -> {cat,price,up,pm,wt,wu}
  const[pendingBC,setPendingBC]=useState(null);
  const[scanLoading,setScanLoading]=useState(false);
  const[showTax,setShowTax]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const[showScan,setShowScan]=useState(false);
  const[showTrip,setShowTrip]=useState(false);
  const[showTheme,setShowTheme]=useState(false);
  const[nn,setNn]=useState("");
  const[nc,setNc]=useState("Other");
  const[showCP,setShowCP]=useState(null);
  const[col,setCol]=useState({});
  const[ecf,setEcf]=useState(null);
  const[chk,setChk]=useState(new Set());
  const[pei,setPei]=useState(null);
  const[nq,setNq]=useState(1);
  const[scanReview,setScanReview]=useState(null); // {name, category, barcode}
  const[editingItem,setEditingItem]=useState(null); // item to edit
  const[recentAlert,setRecentAlert]=useState(null); // {itemName, purchases}
  const idR=useRef(Date.now());

  const t=THEMES[tid]||THEMES.mint;

  // Persist current list on every change
  useEffect(()=>{LS.set("g_current_items",items);},[items]);

  const sThm=id=>{setTid(id);LS.set("g_theme",id);};
  const sIcm=m=>{setIcm(m);LS.set("g_icm",m);};
  const saveBcDB=db=>{setBcDB(db);LS.set("g_bcdb",db);};
  // Normalize a barcode so the same product matches across formats: a numeric
  // GTIN is compared without leading zeros (UPC-A 12-digit == EAN-13 with a
  // leading 0); non-numeric codes (Code 128/39 etc.) are matched exactly.
  const bcKey=code=>{const s=String(code||"").trim();return /^\d+$/.test(s)?(s.replace(/^0+/,"")||"0"):s;};
  const findBC=code=>{
    if(bcDB[code])return bcDB[code];
    const k=bcKey(code);
    for(const key in bcDB){if(bcKey(key)===k)return bcDB[key];}
    return null;
  };
  // Remember an item by name so re-adding it recalls category & last price even
  // when there's no barcode. Only overwrites a remembered price when given a real one.
  const rememberItem=(name,info={})=>{
    const key=(name||"").trim().toLowerCase();
    if(!key)return;
    setImem(prev=>{
      const cur=prev[key]||{};
      const next={...cur};
      if(info.cat)next.cat=info.cat;
      if(info.pm)next.pm=info.pm;
      if(info.price!=null&&info.price>0){next.price=info.price;next.pm=info.pm||next.pm||"fixed";}
      if(info.up!=null&&info.up>0)next.up=info.up;
      if(info.wt!=null&&info.wt>0)next.wt=info.wt;
      if(info.wu)next.wu=info.wu;
      const upd={...prev,[key]:next};
      LS.set("g_imem",upd);
      return upd;
    });
  };
  const recall=name=>imem[(name||"").trim().toLowerCase()]||null;
  const hTax=(st,rt)=>{setTst(st);setTrate(rt);LS.set("g_loc_st",st);LS.set("g_loc_rt",rt);};
  const hGoals=(tb,per)=>{setTotalBudget(tb);setBudgetPeriod(per);LS.set("g_bgt",{tb,per});};

  // Check if this item was purchased in last 30 days (by name match, case-insensitive, or barcode)
  // Excludes Produce category. Returns array of {date, store, price} sorted most recent first, or null.
  const checkRecentPurchase=(name,category,barcode)=>{
    if(category==="Produce")return null;
    const nameLc=name.trim().toLowerCase();
    if(!nameLc)return null;
    const cutoff=Date.now()-(30*24*60*60*1000);
    const matches=[];
    trips.forEach(tr=>{
      const trDate=new Date(tr.date).getTime();
      if(trDate<cutoff)return;
      // Barcode match (if item has barcode property stored)
      if(barcode&&tr.items?.some(it=>it.barcode===barcode)){
        const found=tr.items.find(it=>it.barcode===barcode);
        matches.push({date:tr.date,store:tr.store,price:found?.price||0});
        return;
      }
      // Name match (case-insensitive, exact match — also try contains for slight variations)
      const named=tr.items?.find(it=>{
        if(!it.name)return false;
        const itLc=it.name.trim().toLowerCase();
        return itLc===nameLc;
      });
      if(named){
        // Skip if matched item was Produce
        if(named.category==="Produce")return;
        matches.push({date:tr.date,store:tr.store,price:named.price||0});
      }
    });
    if(matches.length===0)return null;
    matches.sort((a,b)=>new Date(b.date)-new Date(a.date));
    return matches;
  };

  const addItem=(name,cat="Other",openPad=false,qty=1)=>{
    const id=idR.current++;
    const key=name.trim().toLowerCase();
    const rc=icm[key]||cat;
    const item={id,name,category:rc,originalCategory:rc,price:0,pm:"fixed",up:0,wt:0,wu:"lb",qty:qty||1};
    setItems(p=>[...p,item]);
    // Remember this name→category so the next manual entry recognizes it
    // (autocomplete + auto-category), even without a barcode.
    sIcm({...icm,[key]:rc});
    rememberItem(name,{cat:rc});
    setNn("");setNc("Other");setNq(1);setShowAdd(false);
    if(openPad)setPei(item);
    // Check if recently purchased
    const recent=checkRecentPurchase(name,rc,null);
    if(recent)setRecentAlert({itemName:name,purchases:recent});
  };

  const handleSelectSuggestion=name=>{
    const key=name.trim().toLowerCase();
    const cat=icm[key]||"Other";
    setNn(name);setNc(cat);
  };

  const hScan=async code=>{
    setShowScan(false);
    const known=findBC(code);
    if(known){setScanReview({name:known.name,category:known.category||"Other",barcode:code});return;}
    setScanLoading(true);
    try{
      const ctrl=new AbortController();
      const to=setTimeout(()=>ctrl.abort(),8000);
      const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`,{signal:ctrl.signal});
      clearTimeout(to);
      const data=await res.json();
      if(data.status===1&&data.product){
        const raw=data.product.product_name||data.product.product_name_en||data.product.generic_name||"";
        const name=raw.trim();
        if(name){
          const cats=(data.product.categories_tags||[]).join(" ").toLowerCase();
          let cat="Other";
          if(cats.includes("dairy")||cats.includes("milk")||cats.includes("cheese")||cats.includes("yogurt"))cat="Dairy";
          else if(cats.includes("fresh-food")||cats.includes("fruits")||cats.includes("vegetables"))cat="Produce";
          else if(cats.includes("meat")||cats.includes("seafood")||cats.includes("fish")||cats.includes("poultry"))cat="Meat & Seafood";
          else if(cats.includes("frozen"))cat="Frozen";
          else if(cats.includes("bread")||cats.includes("baker")||cats.includes("pastr"))cat="Bakery";
          else if(cats.includes("beverage")||cats.includes("drink")||cats.includes("water")||cats.includes("soda")||cats.includes("juice"))cat="Beverages";
          else if(cats.includes("snack")||cats.includes("chip")||cats.includes("cookie")||cats.includes("candy"))cat="Snacks";
          else if(cats.includes("canned")||cats.includes("pasta")||cats.includes("rice")||cats.includes("cereal")||cats.includes("sauce"))cat="Pantry";
          else if(cats.includes("cleaning")||cats.includes("household"))cat="Household";
          saveBcDB({...bcDB,[code]:{name,category:cat}});
          setScanLoading(false);
          setScanReview({name,category:cat,barcode:code});
          return;
        }
      }
    }catch{}
    setScanLoading(false);
    setPendingBC(code);
  };

  const hScanReviewSave=(data)=>{
    const{name,category,qty,unitPrice,total}=data;
    const id=idR.current++;
    const key=name.trim().toLowerCase();
    sIcm({...icm,[key]:category});
    rememberItem(name,{cat:category,up:unitPrice,pm:"fixed"});
    if(scanReview.barcode)saveBcDB({...bcDB,[scanReview.barcode]:{name,category}});
    const price=total||0;
    const cat=price>0?IN_CART_CAT:category;
    const item={id,name,category:cat,originalCategory:category,price,pm:"fixed",up:unitPrice,wt:0,wu:"lb",qty:qty||1,barcode:scanReview.barcode||null};
    setItems(p=>[...p,item]);
    // Check if recently purchased (matches by barcode or by name, excluding produce)
    const recent=checkRecentPurchase(name,category,scanReview.barcode);
    setScanReview(null);
    if(recent)setRecentAlert({itemName:name,purchases:recent});
  };

  const hPendingSave=(name,cat)=>{saveBcDB({...bcDB,[pendingBC]:{name,category:cat}});setScanReview({name,category:cat,barcode:pendingBC});setPendingBC(null);};
  const rmItem=id=>setItems(p=>p.filter(i=>i.id!==id));
  const togChk=id=>setChk(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});

  const hEditItemSave=(id,data)=>{
    setItems(p=>p.map(i=>{
      if(i.id!==id)return i;
      const newCat=data.originalCategory;
      const newPrice=data.price||0;
      const inCart=newPrice>0?IN_CART_CAT:newCat;
      return{...i,...data,category:inCart,originalCategory:newCat};
    }));
    if(data.name){
      sIcm({...icm,[data.name.trim().toLowerCase()]:data.originalCategory});
      rememberItem(data.name,{cat:data.originalCategory,pm:data.pm,price:data.price,up:data.up,wt:data.wt,wu:data.wu});
    }
    setEditingItem(null);
  };
  const hPrice=data=>{
    const id=pei.id;
    const newPrice=data.pm==="fixed"?data.price:(data.up||0)*(data.wt||0);
    setItems(p=>p.map(i=>{
      if(i.id!==id)return i;
      const newCat=newPrice>0?IN_CART_CAT:i.originalCategory||i.category;
      return{...i,...data,category:newCat};
    }));
    // Remember the price so this item recalls it next time it's added/scanned.
    if(newPrice>0)rememberItem(pei.name,{pm:data.pm,price:newPrice,up:data.up,wt:data.wt,wu:data.wu});
    setPei(null);
  };

  const hComplete=(store,overrideTotal)=>{
    const priced=items.filter(i=>i.price>0);
    const unpriced=items.filter(i=>i.price===0);
    const sub=priced.reduce((s,i)=>s+i.price,0);
    const tx=sub*trate/100;
    const estTotal=sub+tx;
    const hasOv=overrideTotal!=null&&!isNaN(overrideTotal)&&overrideTotal>0;
    const total=hasOv?overrideTotal:estTotal;
    const trip={date:new Date().toISOString(),store,items:priced.map(i=>({name:i.name,category:i.originalCategory||i.category,price:i.price,barcode:i.barcode||null})),subtotal:sub,tax:tx,total,estTotal,adjusted:hasOv,location:tst};
    const upd=[...trips,trip];
    setTrips(upd);LS.set("g_trips",upd);
    const mem={...icm};
    priced.forEach(i=>{
      const c=i.originalCategory||i.category;
      mem[i.name.trim().toLowerCase()]=c;
      rememberItem(i.name,{cat:c,pm:i.pm,price:i.price,up:i.up,wt:i.wt,wu:i.wu});
    });
    sIcm(mem);
    // Keep only unpriced items on the list
    setItems(unpriced);
    setChk(new Set());setShowTrip(false);
  };

  const[categoryOrder,setCategoryOrder]=useState(()=>{
    const saved=LS.get("g_cat_order")||[];
    // Merge: start with saved order, append any new categories not yet saved
    const base=saved.filter(c=>CATEGORIES.includes(c));
    const missing=CATEGORIES.filter(c=>!base.includes(c));
    return [...base,...missing];
  });
  const saveCatOrder=ord=>{setCategoryOrder(ord);LS.set("g_cat_order",ord);};

  const grouped={};
  items.forEach(i=>{
    const cat=i.category||"Other";
    if(!grouped[cat])grouped[cat]=[];
    grouped[cat].push(i);
  });
  const sub=items.reduce((s,i)=>s+i.price,0);
  const tax=sub*trate/100;
  const tot=sub+tax;
  const bs={border:"none",cursor:"pointer",fontWeight:600};

  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <div style={{padding:"12px",display:"flex",alignItems:"center",justifyContent:"space-between",background:t.hd}}>
        <h1 style={{fontSize:16,fontWeight:700,color:"#fff",letterSpacing:"-0.3px"}}>🛒 Grocery Expense Tracker</h1>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setShowTheme(true)} style={{...bs,width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,background:"rgba(255,255,255,0.15)",color:"#fff"}}>🎨</button>
          {tab==="list"&&items.length>0&&<button onClick={()=>setShowTrip(true)} style={{...bs,padding:"6px 12px",borderRadius:8,fontSize:12,background:"rgba(255,255,255,0.95)",color:t.acd}}>✅ Done</button>}
        </div>
      </div>

      <div style={{display:"flex",background:t.tab,borderBottom:`1px solid ${t.cb}`}}>
        <button onClick={()=>setTab("list")} style={{...bs,flex:1,padding:"10px 0",fontSize:12,textAlign:"center",background:"transparent",borderBottom:`2px solid ${tab==="list"?t.ac:"transparent"}`,color:tab==="list"?t.ac:t.tx2}}>🛒 List</button>
        <button onClick={()=>setTab("spending")} style={{...bs,flex:1,padding:"10px 0",fontSize:12,textAlign:"center",background:"transparent",borderBottom:`2px solid ${tab==="spending"?t.ac:"transparent"}`,color:tab==="spending"?t.ac:t.tx2}}>📊 Spending</button>
      </div>

      {tab==="list"?(
        <div style={{paddingBottom:144}}>

          <div style={{margin:"8px 12px 0",display:"flex",gap:8}}>
            <button onClick={()=>setShowAdd(true)} style={{...bs,flex:1,padding:"10px 0",borderRadius:12,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:t.ac,color:t.act}}>+ Add</button>
            <button onClick={()=>setShowScan(true)} style={{...bs,flex:1,padding:"10px 0",borderRadius:12,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:t.acd,color:"#fff"}}>📷 Scan</button>
            <button onClick={()=>setShowTax(true)} style={{...bs,padding:"10px 12px",borderRadius:12,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4,background:t.card,color:t.tx,border:`1px solid ${t.cb}`,whiteSpace:"nowrap"}}>
              <span style={{fontSize:11,color:t.tx2}}>Tax</span>
              <span style={{fontWeight:700,color:t.ac,marginLeft:2}}>{trate===0?"Exempt":`${trate}%`}</span>
              <span style={{fontSize:10,color:t.tx2,marginLeft:2}}>▾</span>
            </button>
          </div>

          {showAdd&&(
            <div style={{margin:"8px 12px 0",padding:12,borderRadius:12,background:t.card,border:`1px solid ${t.cb}`,boxShadow:t.sh}}>
              <SmartInput t={t} value={nn} onChange={v=>{setNn(v);const key=v.trim().toLowerCase();if(icm[key])setNc(icm[key]);}} onSelect={handleSelectSuggestion} icm={icm} bcDB={bcDB}/>
              <button onClick={()=>setShowCP("new")} style={{...bs,width:"100%",padding:"6px 0",borderRadius:8,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginBottom:8,background:t.bar,color:t.tx}}>{CAT_ICONS[nc]} {nc}</button>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:12,color:t.tx2,whiteSpace:"nowrap"}}>Qty:</span>
                <div style={{display:"flex",alignItems:"center",gap:0,borderRadius:8,overflow:"hidden",border:`1px solid ${t.cb}`,background:t.bar}}>
                  <button onClick={()=>setNq(q=>Math.max(1,q-1))} style={{...bs,width:32,height:32,fontSize:18,background:"transparent",color:t.tx}}>−</button>
                  <span style={{minWidth:28,textAlign:"center",fontSize:14,fontWeight:700,color:t.tx}}>{nq}</span>
                  <button onClick={()=>setNq(q=>q+1)} style={{...bs,width:32,height:32,fontSize:18,background:"transparent",color:t.tx}}>+</button>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setShowAdd(false);setNn("");setNc("Other");setNq(1);}} style={{...bs,flex:1,padding:"8px 0",borderRadius:8,fontSize:12,background:t.bar,color:t.tx2}}>Cancel</button>
                <button onClick={()=>{if(nn.trim())addItem(nn.trim(),nc,false,nq);}} style={{...bs,flex:1,padding:"8px 0",borderRadius:8,fontSize:12,background:t.ac,color:t.act}}>Add to List</button>
              </div>
            </div>
          )}

          <DraggableCategoryList
            t={t} grouped={grouped} categoryOrder={categoryOrder}
            onReorder={saveCatOrder} col={col} setCol={setCol}
            chk={chk} togChk={togChk} setPei={setPei} setEcf={setEcf} rmItem={rmItem}
            IN_CART_CAT={IN_CART_CAT} setEditingItem={setEditingItem}
          />

          {items.length>0&&(
            <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:10,padding:12,background:t.card,borderTop:`1px solid ${t.cb}`,boxShadow:"0 -4px 20px rgba(0,0,0,0.15)",backdropFilter:"blur(20px)"}}>
              <div style={{maxWidth:400,margin:"0 auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2,color:t.tx2}}><span>Subtotal ({items.filter(i=>i.price>0).length} priced)</span><span>${sub.toFixed(2)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6,color:t.tx2}}><span>Tax ({trate===0?"Exempt":`${trate}%`})</span><span>${tax.toFixed(2)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:700,paddingTop:6,borderTop:`1px solid ${t.cb}`,color:t.ac}}><span>Total</span><span>${tot.toFixed(2)}</span></div>
              </div>
            </div>
          )}
        </div>
      ):(
        <SpendingView t={t} trips={trips} setTrips={setTrips} totalBudget={totalBudget} budgetPeriod={budgetPeriod} onSetBudget={hGoals}/>
      )}

      {scanLoading&&<LoadingOverlay t={t} msg="Looking up product..."/>}
      {recentAlert&&<RecentPurchaseAlert t={t} itemName={recentAlert.itemName} purchases={recentAlert.purchases} onClose={()=>setRecentAlert(null)}/>}
      {scanReview&&<ScanReviewModal t={t} initialName={scanReview.name} initialCat={scanReview.category} initialPrice={(recall(scanReview.name)||{}).up||(recall(scanReview.name)||{}).price} barcode={scanReview.barcode} onSave={hScanReviewSave} onCancel={()=>setScanReview(null)}/>}
      {editingItem&&<EditItemModal t={t} item={editingItem} onSave={data=>hEditItemSave(editingItem.id,data)} onRemove={()=>{rmItem(editingItem.id);setEditingItem(null);}} onClose={()=>setEditingItem(null)}/>}
      {pei&&<PriceModal t={t} item={pei} mem={recall(pei.name)} onSave={hPrice} onCancel={()=>setPei(null)}/>}
      {showCP==="new"&&<CatPick t={t} onSelect={c=>{setNc(c);setShowCP(null);}} onClose={()=>setShowCP(null)}/>}
      {ecf!==null&&<CatPick t={t} onSelect={c=>{const it=items.find(i=>i.id===ecf);if(it){sIcm({...icm,[it.name.trim().toLowerCase()]:c});rememberItem(it.name,{cat:c});}setItems(p=>p.map(i=>i.id===ecf?{...i,category:i.price>0?IN_CART_CAT:c,originalCategory:c}:i));setEcf(null);}} onClose={()=>setEcf(null)}/>}
      {showScan&&<Scanner onResult={hScan} onManual={()=>{setShowScan(false);setTab("list");setNn("");setNc("Other");setNq(1);setShowAdd(true);}} onClose={()=>setShowScan(false)}/>}
      {pendingBC&&<BarcodeNameModal t={t} barcode={pendingBC} onSave={hPendingSave} onCancel={()=>setPendingBC(null)}/>}
      {showTax&&<TaxPick t={t} state={tst} rate={trate} onSave={hTax} onClose={()=>setShowTax(false)}/>}
      {showTrip&&<TripModal t={t} items={items} tst={tst} trate={trate} onDone={hComplete} onClose={()=>setShowTrip(false)}/>}
      {showTheme&&<ThemePick t={t} current={tid} onSelect={id=>{sThm(id);setShowTheme(false);}} onClose={()=>setShowTheme(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/Grocery.tracker/sw.js',{scope:'/Grocery.tracker/'}).catch(()=>{
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  });
}
</script>
</body>
</html>
